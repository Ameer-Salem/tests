workflows:
  ios-unsigned-build:
    name: iOS Unsigned Build (for Sideloadly)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        
      - name: Force Xcode to ignore code signing
        script: |
          # Switch from Automatic to Manual provisioning to bypass Xcode's team check
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj || true
          
          # Strip out any hardcoded Development Team IDs
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj || true
          
          # Force the Code Signing Identity to be completely empty
          sed -i '' 's/CODE_SIGN_IDENTITY = .*;/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj || true
          
      - name: Build unsigned iOS app
        script: |
          flutter build ios --release --no-codesign
          
      - name: Package unsigned .ipa
        script: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r app-unsigned.ipa Payload
          
    artifacts:
      - build/ios/iphoneos/app-unsigned.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
