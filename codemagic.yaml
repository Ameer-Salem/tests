scripts:
      - name: Get Flutter packages
        script: flutter pub get
        
      - name: Inject Code Signing Overrides
        script: |
          # Force Xcode to completely bypass signing by injecting variables directly into Flutter's config
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM=" >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER=" >> ios/Flutter/Release.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          
      - name: Build unsigned iOS app
        script: |
          flutter build ios --release --no-codesign
          
      - name: Package unsigned .ipa
        script: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r app-unsigned.ipa Payload
